<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue Militaire · Forces Armées du Nil</title>
<meta property="og:image" content="https://BJBellum.github.io/UKN/assets/images/UKNSite.png">
<link rel="icon" type="image/png" href="../../assets/images/UKNSite.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/dune.css">
<style>
*{box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

/* NAV */
.cat-nav{
  position:fixed;top:0;left:0;right:0;height:54px;z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(8,5,0,.97);border-bottom:1px solid rgba(232,92,13,.25);
}
[data-theme="light"] .cat-nav{background:rgba(222,198,152,.97);}

/* SHELL = full height minus nav */
.cat-shell{
  position:fixed;top:54px;left:0;right:0;bottom:0;
  display:flex;overflow:hidden;
}

/* SIDEBAR */
.cat-sidebar{
  width:240px;flex-shrink:0;
  background:#0A0701;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
[data-theme="light"] .cat-sidebar{background:#C8A96E;}

.sb-top{flex-shrink:0;}
.sb-hdr{padding:13px 16px 9px;border-bottom:1px solid var(--border);}
.sb-hdr-name{font-family:'Dune Rise',serif;font-size:9px;letter-spacing:.2em;color:var(--spice);}
.sb-hdr-sub{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.1em;margin-top:2px;}
.sb-total{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.06em;padding:5px 16px;border-bottom:1px solid var(--border);}
.sb-search-wrap{padding:7px 12px;border-bottom:1px solid var(--border);}
.sb-search-in{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 8px;border-radius:2px;outline:none;}
.sb-search-in:focus{border-color:var(--spice);}

.sb-scroll{flex:1;overflow-y:auto;}

/* Groups */
.sb-group{border-bottom:1px solid var(--border);}
.sb-group-hdr{
  display:flex;align-items:center;gap:7px;padding:9px 14px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);
  letter-spacing:.05em;cursor:pointer;user-select:none;transition:background .15s;
}
.sb-group-hdr:hover{background:rgba(232,92,13,.06);}
.sb-arr{font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0;line-height:1;}
.sb-arr.open{transform:rotate(90deg);}
.sb-grp-icon{font-size:14px;flex-shrink:0;}
.sb-grp-lbl{flex:1;line-height:1.3;}
.sb-grp-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}

.sb-children{background:rgba(0,0,0,.15);}
[data-theme="light"] .sb-children{background:rgba(0,0,0,.05);}
.sb-sub{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px 7px 30px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);
  letter-spacing:.05em;cursor:pointer;user-select:none;
  transition:all .15s;border-left:2px solid transparent;
}
.sb-sub:hover{background:rgba(232,92,13,.07);color:var(--text2);}
.sb-sub.active{background:rgba(232,92,13,.12);color:var(--spice);border-left-color:var(--spice);}
.sb-sub-cnt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);background:var(--card-bg);border:1px solid var(--border);padding:1px 5px;border-radius:10px;flex-shrink:0;}
.sb-sub.active .sb-sub-cnt{color:var(--spice);border-color:rgba(232,92,13,.35);}

/* MAIN */
.cat-main{flex:1;overflow-y:auto;background:var(--bg);}
.cat-content{padding:22px 26px 60px;}
@media(max-width:760px){.cat-sidebar{display:none;}.cat-content{padding:14px;}}

/* Section header */
.cat-sec-hdr{margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.cat-sec-title{font-family:'Dune Rise',serif;font-size:clamp(13px,1.6vw,17px);color:var(--spice);letter-spacing:.1em;}
.cat-sec-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;margin-top:4px;}

/* Grid */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
@media(max-width:560px){.cat-grid{grid-template-columns:1fr;}}

/* Card */
.cat-card{
  background:var(--card-bg);
  border:1px solid var(--border);border-top:2px solid rgba(232,92,13,.5);
  display:flex;flex-direction:column;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.cat-card:hover{border-color:var(--spice);box-shadow:0 4px 18px rgba(232,92,13,.07);}

/* Image */
.card-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg2);cursor:pointer;position:relative;}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.cat-card:hover .card-img-wrap img{transform:scale(1.04);}
.card-img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
.card-img-ph-ico{font-size:30px;opacity:.18;}
.card-img-ph-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.12em;}

/* 3 badges */
.card-badges{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border);}
.card-badge{padding:8px 8px;text-align:center;border-right:1px solid var(--border);}
.card-badge:last-child{border-right:none;}
.badge-lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.badge-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.badge-val.spice{color:var(--spice);}
.badge-val.gold{color:var(--gold);font-family:'Dune Rise',serif;font-size:11px;}
.badge-val.bold{font-weight:500;}

/* Toggle */
.card-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;transition:background .15s;}
.card-toggle:hover{background:rgba(232,92,13,.04);}
.card-niv{font-family:'IBM Plex Mono',monospace;font-size:8px;padding:2px 7px;border-radius:2px;border:1px solid;display:inline-block;}
.card-fab{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-left:8px;}
.card-toggle-arrow{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);display:flex;align-items:center;gap:4px;transition:color .15s;}
.card-toggle-tri{font-size:11px;transition:transform .2s;display:inline-block;}
.cat-card.open .card-toggle-arrow{color:var(--spice);}
.cat-card.open .card-toggle-tri{transform:rotate(90deg);}

/* Specs */
.card-specs{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,.09);}
[data-theme="light"] .card-specs{background:rgba(0,0,0,.03);}
.cat-card.open .card-specs{display:block;}
.spec-hdr{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.18em;color:var(--spice);text-transform:uppercase;padding:8px 12px 5px;border-bottom:1px solid rgba(232,92,13,.15);}
.spec-tbl{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:10px;}
.spec-tbl tr:hover td{background:rgba(232,92,13,.02);}
.spec-tbl td{padding:5px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.spec-tbl td:first-child{color:var(--text3);font-size:9px;width:45%;letter-spacing:.05em;}
.spec-tbl td:last-child{color:var(--text);}
.spec-tbl tr:last-child td{border-bottom:none;}

/* NIV colors */
.niv-1,.niv-2{color:#9B8060;border-color:rgba(155,128,96,.35);}
.niv-3,.niv-4{color:#C87830;border-color:rgba(200,120,48,.35);}
.niv-5,.niv-6{color:#D4A843;border-color:rgba(212,168,67,.35);}
.niv-7,.niv-8{color:#22B89A;border-color:rgba(34,184,154,.35);}
.niv-9,.niv-10{color:#4A9EFF;border-color:rgba(74,158,255,.35);}
.niv-11,.niv-12{color:#E85C0D;border-color:rgba(232,92,13,.35);}

/* Empty */
.cat-empty{text-align:center;padding:72px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:.1em;line-height:2;}
.cat-empty-ico{font-size:40px;margin-bottom:12px;opacity:.18;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="cat-nav">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-family:'Dune Rise',serif;font-size:10px;letter-spacing:.18em;color:var(--spice);">Catalogue Militaire</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.1em;border:1px solid rgba(232,92,13,.2);padding:2px 7px;border-radius:2px;">CAT-MIL-001</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="../" style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:5px 10px;border-radius:2px;">← Catalogues</a>
    <button onclick="toggleTheme()" style="background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;cursor:pointer;border-radius:2px;"><span id="tlbl">NUIT</span></button>
  </div>
</nav>

<!-- SHELL -->
<div class="cat-shell">

  <!-- SIDEBAR -->
  <aside class="cat-sidebar">
    <div class="sb-top">
      <div class="sb-hdr">
        <div class="sb-hdr-name">Categories</div>
        <div class="sb-hdr-sub">Forces Armees du Nil · 2305</div>
      </div>
      <div class="sb-total" id="sb-total">— equipements</div>
      <div class="sb-search-wrap">
        <input type="text" class="sb-search-in" id="cat-search" placeholder="Rechercher…" oninput="onSearch()">
      </div>
    </div>
    <div class="sb-scroll" id="sb-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="cat-main">
    <div class="cat-content" id="cat-content">
      <div class="cat-empty">
        <div class="cat-empty-ico">🛡</div>
        Selectionnez une categorie dans la barre laterale.
      </div>
    </div>
  </main>

</div>

<script>
// ── DATA ──────────────────────────────────
var GROUPS=[
  {id:'terrestre',label:'Armement & Forces Terrestres',icon:'⚔',sub:[
    {id:'armes-feu',label:'Armes a Feu'},
    {id:'explosifs',label:'Explosifs & Grenades'},
    {id:'vehicules-terrestres',label:'Vehicules Terrestres'},
    {id:'artillerie',label:'Artillerie Placee'}
  ]},
  {id:'missiles',label:'Missiles & Systemes Balistiques',icon:'🚀',sub:[
    {id:'missiles',label:'Missiles & Roquettes'},
    {id:'missiles-strategiques',label:'Missiles Strategiques'}
  ]},
  {id:'naval',label:'Forces Navales & Aeriennes',icon:'⚓',sub:[
    {id:'aeronefs',label:'Vehicules Aeriens Militaires'},
    {id:'navires',label:'Navires de Surface'},
    {id:'sous-marins',label:'Sous-marins'}
  ]}
];
var TECH={1:'1910-1919',2:'1920-1929',3:'1930-1939',4:'1940-1949',5:'1950-1959',6:'1960-1969',7:'1970-1979',8:'1980-1989',9:'1990-1999',10:'2000-2009',11:'2010-2019',12:'2020-inf'};

// ── STATE ─────────────────────────────────
var catalogue=[];
var openG={terrestre:true,missiles:true,naval:true};
var activeCat='';
var searchQ='';

// ── LOAD ──────────────────────────────────
function loadLocal(){
  try{var s=localStorage.getItem('cat_militaire');catalogue=s?JSON.parse(s):[];}
  catch(e){catalogue=[];}
}
function syncGH(){
  fetch('https://api.github.com/repos/BJBellum/UKN/contents/data/catalogue-militaire.json',{
    headers:{'Accept':'application/vnd.github.v3.raw'},cache:'no-store'
  }).then(function(r){
    if(!r.ok)return;
    return r.json();
  }).then(function(d){
    if(!d||!Array.isArray(d))return;
    d.forEach(function(remote){
      var local=catalogue.find(function(x){return x.id===remote.id;});
      if(local&&local.image_data&&!remote.image_data)remote.image_data=local.image_data;
    });
    catalogue=d;
    localStorage.setItem('cat_militaire',JSON.stringify(catalogue));
    renderSidebar();
    renderContent();
  }).catch(function(){});
}

// ── SIDEBAR ───────────────────────────────
function renderSidebar(){
  var tot=catalogue.length;
  var el=document.getElementById('sb-total');
  if(el)el.textContent=tot+' equipement'+(tot!==1?'s':'');
  var list=document.getElementById('sb-list');
  if(!list)return;
  var html='';
  GROUPS.forEach(function(g){
    var gTot=catalogue.filter(function(i){return g.sub.some(function(s){return s.id===i.categorie;});}).length;
    var isOpen=!!openG[g.id];
    html+='<div class="sb-group">';
    html+='<div class="sb-group-hdr" onclick="toggleG(\''+g.id+'\')">';
    html+='<span class="sb-arr'+(isOpen?' open':'')+'">&#8250;</span>';
    html+='<span class="sb-grp-icon">'+g.icon+'</span>';
    html+='<span class="sb-grp-lbl">'+g.label+'</span>';
    html+='<span class="sb-grp-cnt">'+gTot+'</span>';
    html+='</div>';
    if(isOpen){
      html+='<div class="sb-children">';
      g.sub.forEach(function(sub){
        var cnt=catalogue.filter(function(i){return i.categorie===sub.id;}).length;
        var isAct=sub.id===activeCat;
        html+='<div class="sb-sub'+(isAct?' active':'')+'" onclick="selectCat(\''+sub.id+'\')">';
        html+='<span>'+sub.label+'</span>';
        html+='<span class="sb-sub-cnt">'+cnt+'</span>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  list.innerHTML=html;
}

function toggleG(id){openG[id]=!openG[id];renderSidebar();}
function selectCat(id){
  activeCat=id;searchQ='';
  var si=document.getElementById('cat-search');if(si)si.value='';
  renderSidebar();renderContent();
}
function onSearch(){
  searchQ=(document.getElementById('cat-search').value||'').toLowerCase();
  if(searchQ)activeCat='';
  renderSidebar();renderContent();
}

// ── CONTENT ───────────────────────────────
function renderContent(){
  var el=document.getElementById('cat-content');
  if(!el)return;
  var items=catalogue.slice();
  if(activeCat)items=items.filter(function(i){return i.categorie===activeCat;});
  if(searchQ)items=items.filter(function(i){
    return (i.nom||'').toLowerCase().indexOf(searchQ)>=0||
           (i.fabricant||'').toLowerCase().indexOf(searchQ)>=0||
           (i.inspiration||'').toLowerCase().indexOf(searchQ)>=0;
  });
  if(!items.length){
    var msg=activeCat?'Aucun equipement dans cette categorie.'
           :searchQ?'Aucun resultat pour "'+searchQ+'".'
           :'Selectionnez une categorie dans la barre laterale.';
    el.innerHTML='<div class="cat-empty"><div class="cat-empty-ico">🛡</div>'+msg+'</div>';
    return;
  }
  // Find label
  var allSub=[];GROUPS.forEach(function(g){g.sub.forEach(function(s){allSub.push(s);});});
  var catInfo=allSub.find(function(s){return s.id===activeCat;});
  var html='';
  if(catInfo||searchQ){
    html+='<div class="cat-sec-hdr">';
    html+='<div class="cat-sec-title">'+(catInfo?catInfo.label.toUpperCase():'RESULTATS DE RECHERCHE')+'</div>';
    html+='<div class="cat-sec-sub">'+items.length+' equipement'+(items.length!==1?'s':'')+' · Forces Armees du Nil · 2305</div>';
    html+='</div>';
  }
  html+='<div class="cat-grid">';
  items.forEach(function(item){
    var niv=item.niveau||1;
    var nivLbl='NIV '+niv+' · '+(TECH[niv]||'');
    var imgSrc=item.image_data||(item.image_path?'https://bjbellum.github.io/UKN/'+item.image_path:'');
    var specs=item.specs||{};
    var specRows=Object.keys(specs).filter(function(k){return specs[k];}).map(function(k){
      return '<tr><td>'+k+'</td><td>'+specs[k]+'</td></tr>';
    }).join('');
    var coutFmt=item.cout_unite?Number(item.cout_unite).toLocaleString('fr'):'—';
    html+='<div class="cat-card" id="card-'+item.id+'">';
    // Image
    html+='<div class="card-img-wrap" onclick="toggleCard(\''+item.id+'\')">';
    if(imgSrc){
      html+='<img src="'+imgSrc+'" alt="'+(item.nom||'')+'" loading="lazy">';
    } else {
      html+='<div class="card-img-ph"><div class="card-img-ph-ico">🛡</div><span class="card-img-ph-lbl">AUCUNE IMAGE</span></div>';
    }
    html+='</div>';
    // Badges
    html+='<div class="card-badges">';
    html+='<div class="card-badge"><div class="badge-lbl">Inspiration</div><div class="badge-val spice" title="'+(item.inspiration||'—')+'">'+(item.inspiration||'—')+'</div></div>';
    html+='<div class="card-badge"><div class="badge-lbl">Designation</div><div class="badge-val bold" title="'+(item.nom||'—')+'">'+(item.nom||'—')+'</div></div>';
    html+='<div class="card-badge"><div class="badge-lbl">Cout (N\u00a3)</div><div class="badge-val gold">'+coutFmt+'</div></div>';
    html+='</div>';
    // Toggle
    html+='<div class="card-toggle" onclick="toggleCard(\''+item.id+'\')">';
    html+='<div><span class="card-niv niv-'+niv+'">'+nivLbl+'</span><span class="card-fab">'+(item.fabricant||'')+'</span></div>';
    html+='<div class="card-toggle-arrow"><span>Fiche technique</span><span class="card-toggle-tri">&#8250;</span></div>';
    html+='</div>';
    // Specs
    html+='<div class="card-specs">';
    html+='<div class="spec-hdr">Caracteristiques techniques</div>';
    if(specRows){
      html+='<table class="spec-tbl"><tbody>'+specRows+'</tbody></table>';
    } else {
      html+='<div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--text3);padding:12px;">Aucune specification renseignee.</div>';
    }
    html+='</div>';
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function toggleCard(id){
  var el=document.getElementById('card-'+id);
  if(el)el.classList.toggle('open');
}

// ── THEME ─────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  var lbl=document.getElementById('tlbl');if(lbl)lbl.textContent=t==='dark'?'NUIT':'JOUR';
  localStorage.setItem('run-theme',t);
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
(function(){var s=localStorage.getItem('run-theme'),mq=window.matchMedia('(prefers-color-scheme: dark)');applyTheme(s||(mq.matches?'dark':'light'));})();

// ── INIT (public, no auth) ─────────────────
document.addEventListener('DOMContentLoaded',function(){
  loadLocal();
  renderSidebar();
  renderContent();
  syncGH();
});
</script>
<script src="../../pharos-auth.js"></script>
</body>
</html>
